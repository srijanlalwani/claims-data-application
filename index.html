<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Claims Data Application</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .container { width: 80%; margin: auto; overflow: hidden; }\n        #login, #uploadForm, #results { margin: 20px 0; }\n        #login h2, #uploadForm h2, #results h2 { margin: 10px 0; }\n        input[type='text'], input[type='password'], input[type='file'] { padding: 10px; margin: 5px 0; width: 100%; }\n        button { padding: 10px; background: #28a745; color: #fff; border: none; cursor: pointer; }\n        button:hover { background: #218838; }\n        .dashboard { border: 1px solid #ddd; padding: 15px; margin-top: 10px; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <div id="login">\n            <h2>Login</h2>\n            <input type="text" id="username" placeholder="Username">\n            <input type="password" id="password" placeholder="Password">\n            <button onclick="login()">Login</button>\n            <p id="loginMessage"></p>\n        </div>\n        <div id="uploadForm" style="display:none;">\n            <h2>Upload Claims Data</h2>\n            <input type="file" id="fileInput" accept=".csv, .xlsx">\n            <button onclick="uploadFile()">Upload</button>\n            <div id="results"></div>\n        </div>\n    </div>\n    <script>\n        function login() {\n            const username = document.getElementById('username').value;\n            const password = document.getElementById('password').value;\n            // Mock authentication\n            if (username === 'testuser' && password === 'password') {\n                document.getElementById('login').style.display = 'none';\n                document.getElementById('uploadForm').style.display = 'block';\n                document.getElementById('loginMessage').innerText = '';\n            } else {\n                document.getElementById('loginMessage').innerText = 'Invalid credentials!';\n            }\n        }\n        function uploadFile() {\n            const fileInput = document.getElementById('fileInput');\n            if (fileInput.files.length === 0) {\n                alert('Please select a file!');\n                return;\n            }\n            const file = fileInput.files[0];\n            const reader = new FileReader();\n            reader.onload = function(e) {\n                const contents = e.target.result;\n                validateData(contents);\n            };\n            reader.readAsText(file);\n        }\n        function validateData(data) {\n            const rows = data.split('\n');\n            let missingValues = 0;\n            let duplicates = new Set();\n            let validRows = [];\n            rows.forEach((row, index) => {\n                const columns = row.split(',');\n                // Check for missing values\n                if (columns.includes('')) {\n                    missingValues++;\n                }\n                // Check for duplicates\n                const key = columns.join('|');\n                if (duplicates.has(key)) {\n                    duplicates.add(key);\n                } else {\n                    validRows.push(row);\n                }\n            });\n            displayResults(missingValues, duplicates.size, validRows.length);\n        }\n        function displayResults(missingValues, duplicates, totalValid) {\n            const resultsDiv = document.getElementById('results');\n            resultsDiv.innerHTML = '';\n            resultsDiv.innerHTML += `<div class='dashboard'>Missing Values: ${missingValues}</div>`;\n            resultsDiv.innerHTML += `<div class='dashboard'>Duplicate Rows: ${duplicates}</div>`;\n            resultsDiv.innerHTML += `<div class='dashboard'>Total Valid Rows: ${totalValid}</div>`;\n        }\n    </script>\n</body>\n</html>
